<body>
    <main class="container">
        <h1 class="title">✨ Quote Generator Testing...</h1>

        <div class="quote-card" id="myDiv">
            <div class="overlay"></div>

            <div class="content" id="quoteData">
                <p class="quote" id="setQuote">Loading...</p>
                <p class="author" id="authorName"></p>
            </div>

            <div class="actions">
                <button onclick="fetchNewQuote()">🔄 New</button>
                <button onclick="copyToClipboard()">📋 Copy</button>
                <button onclick="downloadQuoteImage()">⬇️ Download</button>
                <button onclick="shareQuoteOnTwitter()">🐦 Tweet</button>
            </div>
        </div>
    </main>
